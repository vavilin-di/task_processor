name: testing
on:
  workflow_call:

env:
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  POSTGRES_DATABASE: test_db
  POSTGRES_USER: test_user
  POSTGRES_PASSWORD: test_pass
  RABBITMQ_HOST: localhost
  RABBITMQ_PORT: 5672
  RABBITMQ_USER: guest
  RABBITMQ_PASSWORD: guest
  RABBITMQ_VIRTUAL_HOST: /

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests with coverage
        run: |
          echo "::group::Unit tests"
          uv run pytest -v -m unit --cov=src --cov-report= --tb=long
          echo "::endgroup::"
          mv .coverage .coverage.unit
        env:
          COVERAGE_FILE: .coverage.unit

      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: .coverage.unit

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:14.5
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run integration tests with coverage
        run: |
          echo "::group::Integration tests"
          uv run pytest -v -m integration --cov=src --cov-report= --tb=long
          echo "::endgroup::"
          mv .coverage .coverage.integration
        env:
          COVERAGE_FILE: .coverage.integration
          POSTGRES_DB: ${{ env.POSTGRES_DATABASE }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: .coverage.integration

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-integration
          path: |
            *.log
            pytest.log

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:14.5
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run E2E tests with coverage
        run: |
          echo "::group::E2E tests"
          uv run pytest -v -m e2e --cov=src --cov-report= --tb=long
          echo "::endgroup::"
        env:
          COVERAGE_FILE: .coverage.e2e
          POSTGRES_DB: ${{ env.POSTGRES_DATABASE }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}

      - name: Upload E2E coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e
          path: .coverage.e2e

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-e2e
          path: |
            *.log
            pytest.log

  coverage-report:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}

      - name: Download E2E coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-e2e
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}

      - name: Combine coverage data and generate XML report
        run: |
          uv run coverage combine .coverage.unit .coverage.integration .coverage.e2e
          uv run coverage xml -o coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml