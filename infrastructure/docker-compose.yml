services:
  postgres:
    container_name: task_processor_postgres
    image: postgres:14.5
    ports:
      - "127.0.0.1:5432:${POSTGRES_PORT}"
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    container_name: task_processor_rabbitmq
    image: rabbitmq:3.11-management
    ports:
      - "127.0.0.1:5672:${RABBITMQ_PORT}"
      - "127.0.0.1:15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  migration:
    container_name: task_processor_migration
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
    command: ["uv", "run", "alembic", "upgrade", "head"]
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE}
    depends_on:
      postgres:
        condition: service_healthy
    restart: no

  app:
    container_name: task_processor_app
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
    command: ["uv", "run", "uvicorn", "src:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - APP_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE}
      - POSTGRES_POOL_SIZE=${POSTGRES_POOL_SIZE}
      - POSTGRES_MAX_OVERFLOW=${POSTGRES_MAX_OVERFLOW}
      - POSTGRES_POOL_TIMEOUT=${POSTGRES_POOL_TIMEOUT}
      - POSTGRES_POOL_RECYCLE=${POSTGRES_POOL_RECYCLE}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_VIRTUAL_HOST=${RABBITMQ_VIRTUAL_HOST}
      - RABBITMQ_PREFETCH_COUNT=${RABBITMQ_PREFETCH_COUNT}
      - RABBITMQ_HEARTBEAT=${RABBITMQ_HEARTBEAT}
    depends_on:
      migration:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  outbox-publish-worker:
    container_name: task_processor_outbox_worker
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
    command: ["uv", "run", "python", "-m", "src.workers.outbox_publisher.run_outbox_publish_worker"]
    environment:
      - APP_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE}
      - POSTGRES_POOL_SIZE=${POSTGRES_POOL_SIZE}
      - POSTGRES_MAX_OVERFLOW=${POSTGRES_MAX_OVERFLOW}
      - POSTGRES_POOL_TIMEOUT=${POSTGRES_POOL_TIMEOUT}
      - POSTGRES_POOL_RECYCLE=${POSTGRES_POOL_RECYCLE}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_VIRTUAL_HOST=${RABBITMQ_VIRTUAL_HOST}
      - RABBITMQ_PREFETCH_COUNT=${RABBITMQ_PREFETCH_COUNT}
      - RABBITMQ_HEARTBEAT=${RABBITMQ_HEARTBEAT}
    depends_on:
      migration:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  dlq-consumer-worker:
    container_name: task_processor_dlq_worker
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
    command: ["uv", "run", "python", "-m", "src.workers.dlq_consumer.run_dlq_consumer_worker"]
    environment:
      - APP_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE}
      - POSTGRES_POOL_SIZE=${POSTGRES_POOL_SIZE}
      - POSTGRES_MAX_OVERFLOW=${POSTGRES_MAX_OVERFLOW}
      - POSTGRES_POOL_TIMEOUT=${POSTGRES_POOL_TIMEOUT}
      - POSTGRES_POOL_RECYCLE=${POSTGRES_POOL_RECYCLE}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_VIRTUAL_HOST=${RABBITMQ_VIRTUAL_HOST}
      - RABBITMQ_PREFETCH_COUNT=${RABBITMQ_PREFETCH_COUNT}
      - RABBITMQ_HEARTBEAT=${RABBITMQ_HEARTBEAT}
    depends_on:
      migration:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  outbox-cleanup-worker:
    container_name: task_processor_outbox_cleanup_worker
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
    command: ["uv", "run", "python", "-m", "src.workers.outbox_cleanup.run_outbox_cleanup_worker"]
    environment:
      - APP_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE}
      - POSTGRES_POOL_SIZE=${POSTGRES_POOL_SIZE}
      - POSTGRES_MAX_OVERFLOW=${POSTGRES_MAX_OVERFLOW}
      - POSTGRES_POOL_TIMEOUT=${POSTGRES_POOL_TIMEOUT}
      - POSTGRES_POOL_RECYCLE=${POSTGRES_POOL_RECYCLE}
    depends_on:
      migration:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
